<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nearby Stations - GasLog</title>
    <link rel="icon" type="image/png" href="../app/gaslog.png">
    <link rel="stylesheet" href="system-design.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>
    <button class="burger-btn" onclick="toggleNav()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav class="nav-sidebar" id="navSidebar">
        <div class="nav-sidebar-header">
            <h2>GasLog</h2>
            <button class="nav-close" onclick="toggleNav()">×</button>
        </div>
        <div class="nav-menu">
            <a href="index.html">Refill</a>
            <a href="vehicles.html">Vehicles</a>
            <a href="stations.html" class="active">Stations</a>
            <a href="login.html">Login</a>
            <a href="settings.html">Settings</a>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay" onclick="toggleNav()"></div>

    <div class="app-container">
        <div class="page-header">
            <h1>Nearby Gas Stations</h1>
            <p>Find stations around your current GPS location</p>
        </div>

        <section class="content-section">
            <h2>Map</h2>
            <div class="station-picker-map-shell" id="nearbyMapShell">
                <div id="stationNearbyMap" class="station-picker-map" aria-label="Nearby gas stations map"></div>
            </div>
            <p class="text-muted mb-0" id="nearestStationLabel">Allow location access to load nearby stations.</p>
            <p class="text-muted mb-0 hidden" id="locationStationResult"></p>
        </section>

        <section class="content-section">
            <h2>Stations In View</h2>
            <div class="item-list nearby-stations-list" id="nearbyStationsList"></div>
        </section>
    </div>

    <script src="js/app.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/stations_nearby.js"></script>
</body>
</html>
